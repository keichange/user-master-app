name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    outputs:
      test_output: ${{ steps.run_tests.outputs.test_output }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations (SQLite)
        run: php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Run tests
        id: run_tests
        run: |
          output=$(php artisan test 2>&1) || true
          echo "test_output<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

  auto-fix:
    runs-on: ubuntu-latest
    needs: test
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Gemini Auto Fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          TEST_OUTPUT: ${{ needs.test.outputs.test_output }}
        run: |
          python3 << 'PYEOF'
          import os, subprocess, json, re
          from google import genai

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          # エラーログを収集
          test_output = os.environ.get("TEST_OUTPUT", "")

          # 関連ファイルを収集（app/以下のPHPファイル）
          code_context = ""
          for root, dirs, files in os.walk("app"):
              dirs[:] = [d for d in dirs if d not in ["vendor"]]
              for f in files:
                  if f.endswith(".php"):
                      path = os.path.join(root, f)
                      with open(path) as fp:
                          code_context += f"\n\n### {path}\n```php\n{fp.read()}\n```"

          prompt = f"""
          LaravelアプリのCIテストが失敗しました。
          エラーを分析し、以下の形式で回答してください。

          ## テスト出力
          {test_output[:4000]}

          ## ソースコード
          {code_context[:6000]}

          ## ルール
          - マイグレーションファイルは変更しない
          - .github/workflows/ は変更しない
          - 1ファイルのみ変更する

          ## 回答形式（この形式を厳守）

          FILE: 変更するファイルパス
          REASON: 根本原因（日本語・1行）
          SUMMARY: 修正内容の要約（日本語・1行）
          CONTENT:
          ```php
          修正後のファイル全体の内容をここに書く
          ```
          """

          response = client.models.generate_content(
              model="gemini-3.1-flash-lite-preview", contents=prompt
          )
          text = response.text.strip()
          print("=== Gemini response ===")
          print(text[:500])

          # 各フィールドを抽出
          file_match    = re.search(r'^FILE:\s*(.+)$', text, re.MULTILINE)
          reason_match  = re.search(r'^REASON:\s*(.+)$', text, re.MULTILINE)
          summary_match = re.search(r'^SUMMARY:\s*(.+)$', text, re.MULTILINE)
          content_match = re.search(r'```php\n(.*?)```', text, re.DOTALL)

          if not (file_match and content_match):
              print("必要な情報が取得できませんでした")
              exit(1)

          file_path   = file_match.group(1).strip()
          reason      = reason_match.group(1).strip() if reason_match else "不明"
          summary     = summary_match.group(1).strip() if summary_match else "自動修正"
          new_content = content_match.group(1)

          print(f"修正対象: {file_path}")
          print(f"根本原因: {reason}")

          # ファイルを修正
          with open(file_path, "w") as fp:
              fp.write(new_content)

          # ブランチを作成してPRを出す
          branch = f"auto-fix/{os.environ['SHA'][:8]}"
          subprocess.run(["git", "config", "user.email", "github-actions@github.com"], check=True)
          subprocess.run(["git", "config", "user.name", "GitHub Actions"], check=True)
          subprocess.run(["git", "checkout", "-b", branch], check=True)
          subprocess.run(["git", "add", file_path], check=True)
          subprocess.run(["git", "commit", "-m", f"fix: Gemini自動修正 - {summary}"], check=True)
          subprocess.run(["git", "push", "origin", branch], check=True)

          # Draft PRを作成
          pr_body = f"""## AI自動修正PR（要レビュー）

          ### 根本原因
          {reason}

          ### 修正内容
          {summary}

          ### 変更ファイル
          `{file_path}`

          ---
          > このPRはGemini AIが自動生成しました。マージ前に必ずレビューしてください。
          """

          result = subprocess.run([
              "gh", "pr", "create",
              "--title", f"[Auto Fix] {summary}",
              "--body", pr_body,
              "--base", "main",
              "--head", branch,
              "--draft"
          ], capture_output=True, text=True)

          print(result.stdout)
          print(result.stderr)

          # PR URLを取得してファイルに保存
          pr_url = result.stdout.strip()
          with open("/tmp/pr_url.txt", "w") as f:
              f.write(pr_url if pr_url.startswith("http") else "")
          with open("/tmp/pr_summary.txt", "w") as f:
              f.write(summary)
          PYEOF

      - name: Notify Slack - PR作成成功
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Geminiが自動修正PRを作成しました（レビューしてください）*\n修正内容: $(cat /tmp/pr_summary.txt)\nPR: $(cat /tmp/pr_url.txt)\nリポジトリ: ${{ github.repository }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack - 自動修正失敗
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":sos: *Geminiの自動修正に失敗しました（手動対応が必要です）*\nリポジトリ: ${{ github.repository }}\nブランチ: ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Actions詳細>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
