name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    outputs:
      test_output: ${{ steps.run_tests.outputs.test_output }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations (SQLite)
        run: php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Run tests
        id: run_tests
        run: |
          output=$(php artisan test 2>&1) || true
          echo "test_output<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

  auto-fix:
    runs-on: ubuntu-latest
    needs: test
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          # インストール先は $HOME/.local/bin/agent
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cursor Auto Fix
        id: cursor
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          TEST_OUTPUT: ${{ needs.test.outputs.test_output }}
        run: |
          BRANCH="auto-fix/${SHA:0:8}"
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b "$BRANCH"

          # agentのバージョン・ヘルプ確認
          echo "=== agent version ==="
          agent --version || echo "version check failed"
          echo "=== agent help ==="
          agent --help 2>&1 || echo "help failed"

          # Cursor エージェントに修正を依頼
          echo "=== Running agent ==="
          agent -p "
          CIのテストが失敗しました。以下のエラーログを分析してコードを修正してください。

          ## エラーログ
          ${TEST_OUTPUT:0:3000}

          ## 修正ルール（CLAUDE.mdを必ず確認）
          - 1ファイルのみ変更する
          - database/migrations/ は変更しない
          - .github/workflows/ は変更しない
          " 2>&1 || echo "agent exit code: $?"
          echo "=== git status after agent ==="
          git status

          # 変更があればコミット＆PR作成
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            SUMMARY=$(git diff --cached --stat | head -1)
            git commit -m "fix: Cursor自動修正 - $SUMMARY"
            git push origin "$BRANCH"

            PR_URL=$(gh pr create \
              --title "[Auto Fix] Cursor自動修正 ${SHA:0:8}" \
              --body "## AI自動修正PR（要レビュー）

          ### エラーログ
          \`\`\`
          ${TEST_OUTPUT:0:1000}
          \`\`\`

          ---
          > このPRはCursor AIが自動生成しました。マージ前に必ずレビューしてください。" \
              --base main \
              --head "$BRANCH" \
              --draft)

            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "summary=Cursor自動修正 ${SHA:0:8}" >> $GITHUB_OUTPUT
          else
            echo "変更なし - 自動修正できませんでした"
            exit 1
          fi

      - name: Notify Slack - PR作成成功
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Cursorが自動修正PRを作成しました（レビューしてください）*\nPR: ${{ steps.cursor.outputs.pr_url }}\nリポジトリ: ${{ github.repository }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack - 自動修正失敗
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":sos: *Cursorの自動修正に失敗しました（手動対応が必要です）*\nリポジトリ: ${{ github.repository }}\nブランチ: ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Actions詳細>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
