name: Auto Fix on CI Failure

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-fix:
    # CIが失敗したときだけ実行
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Get CI failure logs
        id: get-logs
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.payload.workflow_run.id;
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id,
            });
            const failedJob = jobs.data.jobs.find(j => j.conclusion === 'failure');
            if (failedJob) {
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                job_id: failedJob.id,
              });
              core.setOutput('logs', logs.data.substring(0, 8000));
              core.setOutput('job_name', failedJob.name);
            }

      - name: Claude Auto Fix
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "auto-fix"
          direct_prompt: |
            CIが失敗しました。以下のエラーログを分析して修正PRを作成してください。

            ## 失敗したジョブ
            ${{ steps.get-logs.outputs.job_name }}

            ## エラーログ
            ```
            ${{ steps.get-logs.outputs.logs }}
            ```

            ## 修正ルール（CLAUDE.mdを必ず確認）
            - 1ファイルの変更に留める
            - マイグレーションファイルは変更しない
            - .github/workflows/ は変更しない
            - Draft PRとして作成する
            - PR本文に根本原因・修正内容・影響範囲を日本語で記載

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":red_circle: *CIが失敗しました*\nリポジトリ: ${{ github.repository }}\nブランチ: ${{ github.event.workflow_run.head_branch }}\nコミット: ${{ github.event.workflow_run.head_sha }}\n<${{ github.event.workflow_run.html_url }}|詳細を見る>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
